name: explorer-net
version: '1.0.0'
services:
  postgres:
    image: postgres:16-alpine
    container_name: explorer-net-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: explorer_net
    ports:
      - "25432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U explorer -d explorer_net"]
      interval: 5s
      timeout: 5s
      retries: 10

