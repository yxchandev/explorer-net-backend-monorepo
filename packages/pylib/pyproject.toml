[project]
name = "pylib"
version = "0.1.0"
description = "Shared Python library for Explorer Net workspace apps"
readme = "README.md"
authors = [
    { name = "Chan Yu Xiang", email = "gnomemage1990@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "asyncpg>=0.31.0",
    "psycopg[binary]>=3.3.4",
    "pydantic>=2.13.4",
    "sqlalchemy[asyncio]>=2.0.51",
]

[build-system]
requires = ["setuptools>=75"]
build-backend = "setuptools.build_meta"
